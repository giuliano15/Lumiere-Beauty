<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pele | Lumiere Beauty</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <div class="top-bar"><p>Categoria: Pele</p></div>
  <header class="header-wrap"><div class="header container"><a href="index.html" class="logo">Lumiere Beauty</a><nav class="nav"><a href="produtos.html">Todos</a><a href="pele.html">Pele</a><a href="olhos.html">Olhos</a><a href="labios.html">Labios</a><a href="skincare.html">Skincare</a><a href="kits.html">Kits</a></nav><button id="open-favorites" class="button button-secondary icon-header-btn" type="button" aria-label="Favoritos"><i class="bi bi-heart"></i> <span id="favorite-count">0</span></button><button id="open-cart" class="button button-dark" type="button"><i class="bi bi-bag"></i> Carrinho <span id="cart-count">0</span></button></div></header>
  <main class="container section">
    <div class="section-head"><h1>Pele</h1><p>Produtos da categoria pele.</p></div>
    <div id="products-grid" class="products-grid">
      <article class="product-card" data-category="pele" data-product="Base Velvet Glow" data-price="69.90" data-image="https://images.pexels.com/photos/2533266/pexels-photo-2533266.jpeg?auto=compress&cs=tinysrgb&w=600">
        <a class="product-link" href="produto.html?produto=Base%20Velvet%20Glow&preco=69.90&categoria=pele&imagem=https%3A%2F%2Fimages.pexels.com%2Fphotos%2F2533266%2Fpexels-photo-2533266.jpeg%3Fauto%3Dcompress%26cs%3Dtinysrgb%26w%3D1200"><img class="product-media" src="https://images.pexels.com/photos/2533266/pexels-photo-2533266.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Base Velvet Glow" /></a>
        <p class="product-category">Pele</p><h3><a class="product-link-text" href="produto.html?produto=Base%20Velvet%20Glow&preco=69.90&categoria=pele&imagem=https%3A%2F%2Fimages.pexels.com%2Fphotos%2F2533266%2Fpexels-photo-2533266.jpeg%3Fauto%3Dcompress%26cs%3Dtinysrgb%26w%3D1200">Base Velvet Glow</a></h3><p class="product-price">R$ 69,90</p>
        <div class="quantity-box"><button class="qty-btn minus" type="button">-</button><input class="qty-input" type="number" min="1" value="1" /><button class="qty-btn plus" type="button">+</button></div>
        <button class="button button-buy add-to-cart" type="button">Comprar agora</button>
      </article>
    </div>
  </main>
  <aside id="cart-drawer" class="cart-drawer"><div class="cart-head"><h3><i class="bi bi-bag"></i> Seu carrinho</h3><button id="close-cart" type="button">x</button></div><div id="cart-items" class="cart-items"><p class="cart-empty">Seu carrinho esta vazio.</p></div><div class="cart-footer"><p>Subtotal: <strong id="cart-subtotal">R$ 0,00</strong></p><p>Total: <strong id="cart-total">R$ 0,00</strong></p><a id="checkout-whatsapp" class="button button-checkout" target="_blank" href="#"><i class="bi bi-whatsapp"></i> Finalizar pedido no WhatsApp</a></div></aside>
  <div id="cart-overlay" class="overlay"></div>
  <aside id="favorites-drawer" class="favorites-drawer"><div class="cart-head"><h3><i class="bi bi-heart"></i> Seus favoritos</h3><button id="close-favorites" type="button">x</button></div><div id="favorites-items" class="cart-items"><p class="cart-empty">Nenhum favorito ainda.</p></div></aside>
  <div id="favorites-overlay" class="overlay"></div>
  <script src="src/main.js"></script>
</body>
</html>
